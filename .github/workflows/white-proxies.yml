name: Fetch Proxies

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch subscription
        run: |
          curl -fsSL \
            -H "User-Agent: Happ/3.15.2/" \
            "https://sub.white-ghost.ru/eoAwSW3VPx5z9z2S" \
            -o raw.txt

      - name: Extract proxy links
        run: |
          if base64 -d raw.txt > decoded.txt 2>/dev/null && grep -qE '(vless|vmess|trojan|ss|hysteria)://' decoded.txt; then
            grep -oE '(vless|vmess|trojan|ss|ssr|hysteria2|hy2|tuic|wg)://[^[:space:]]+' decoded.txt > white.txt || true
          else
            grep -oE '(vless|vmess|trojan|ss|ssr|hysteria2|hy2|tuic|wg)://[^[:space:]]+' raw.txt > white.txt || true
          fi
          echo "Extracted $(wc -l < white.txt) proxies"

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add white.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update proxies $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
