name: Fetch Proxies

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch subscription
        run: |
          curl -fsSL \
            -H "User-Agent: Happ/3.15.1 (Android)" \
            "https://sub.white-ghost.ru/eoAwSW3VPx5z9z2S" \
            -o raw.txt

      - name: Decrypt happ://crypt links
        env:
          SAYORI_API_KEY: ${{ secrets.SAYORI_API_KEY }}
        run: |
          python3 << 'EOF'
          import re, json, subprocess, sys, os

          with open("raw.txt") as f:
              content = f.read()

          crypt_links = re.findall(r'happ://crypt\S+', content)

          if not crypt_links:
              print("No encrypted links, skipping")
              sys.exit(0)

          api_key = os.environ.get("SAYORI_API_KEY", "")
          if not api_key:
              print("SAYORI_API_KEY not set, skipping")
              sys.exit(0)

          decrypted = 0
          for link in crypt_links:
              result = subprocess.run([
                  "curl", "-sfS", "-X", "POST",
                  "https://api.sayori.cc/v1/decrypt",
                  "-H", "Content-Type: application/json",
                  "-H", f"x-api-key: {api_key}",
                  "-d", json.dumps({"data": link})
              ], capture_output=True, text=True)
              try:
                  resp = json.loads(result.stdout)
                  if resp.get("success") and resp.get("result"):
                      content = content.replace(link, resp["result"])
                      decrypted += 1
              except Exception as e:
                  print(f"Failed: {link} — {e}")

          print(f"Decrypted {decrypted}/{len(crypt_links)} links")
          with open("raw.txt", "w") as f:
              f.write(content)
          EOF

      - name: Extract proxy links
        run: |
          if base64 -d raw.txt > decoded.txt 2>/dev/null && grep -qE '(vless|vmess|trojan|ss|hysteria)://' decoded.txt; then
            grep -oE '(vless|vmess|trojan|ss|ssr|hysteria2|hy2|tuic|wg)://[^[:space:]]+' decoded.txt > white.txt || true
          else
            grep -oE '(vless|vmess|trojan|ss|ssr|hysteria2|hy2|tuic|wg)://[^[:space:]]+' raw.txt > white.txt || true
          fi
          echo "Extracted $(wc -l < white.txt) proxies"

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add white.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update proxies $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
