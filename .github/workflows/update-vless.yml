name: Update VLESS from subs.txt

on:
  push:
    paths:
      - 'subs.txt'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests

      - name: Запустить парсер
        run: python parse_vless.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add result.txt
          if git diff --staged --quiet; then
            echo "Ничего не изменилось"
          else
            git commit -m "Auto update from subs.txt $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
