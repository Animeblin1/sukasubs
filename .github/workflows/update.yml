name: Update proxy list

on:
  push:
    paths:
      - 'subs.txt'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install --upgrade pip requests pyyaml

      - name: Debug - probe URLs
        run: |
          python3 - <<'PYEOF'
          import urllib.request, sys

          urls = open("subs.txt").read().splitlines()
          urls = [u.strip() for u in urls if u.strip() and not u.startswith("#")]

          for url in urls:
              req = urllib.request.Request(url, headers={
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36",
              })
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      body = r.read(512)
                      print(f"[PROBE] {url}")
                      print(f"  status: {r.status}")
                      print(f"  ct: {r.headers.get('Content-Type')}")
                      print(f"  first 200b: {body[:200]}")
              except Exception as e:
                  print(f"[PROBE FAIL] {url}: {e}")
          PYEOF

      - name: Parse
        run: python parse_vless.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          COUNT=$(grep -c "://" result.txt 2>/dev/null || echo 0)
          git add -f result.txt
          git commit -m "auto: ${COUNT} links — $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "nothing to commit"
          git push || echo "push failed"

      - name: Cleanup old runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_RUN: ${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.error, json, os

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          current_run = int(os.environ["CURRENT_RUN"])
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def gh(method, path):
              req = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers=headers, method=method,
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read()) if r.length else None
              except urllib.error.HTTPError:
                  return None

          page, deleted = 1, 0
          while True:
              data = gh("GET", f"/repos/{repo}/actions/runs?per_page=100&page={page}&status=completed")
              if not data:
                  break
              runs = data.get("workflow_runs", [])
              if not runs:
                  break
              for run in runs:
                  if run["id"] != current_run:
                      gh("DELETE", f"/repos/{repo}/actions/runs/{run['id']}")
                      deleted += 1
              if len(runs) < 100:
                  break
              page += 1
          print(f"Deleted {deleted} completed runs")
          PYEOF
