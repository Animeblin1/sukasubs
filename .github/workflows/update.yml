name: Update proxy list

on:
  push:
    paths:
      - 'subs.txt'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install --upgrade pip requests pyyaml

      - run: python parse_vless.py

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f result.txt
          git diff --staged --quiet || (git commit -m "auto: $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)

      - name: Cleanup old runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_RUN: ${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.error, json, os

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          current_run = int(os.environ["CURRENT_RUN"])

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def gh(method, path):
              req = urllib.request.Request(
                  f"https://api.github.com{path}",
                  headers=headers,
                  method=method,
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read()) if r.length else None
              except urllib.error.HTTPError:
                  return None

          page, deleted = 1, 0
          while True:
              data = gh("GET", f"/repos/{repo}/actions/runs?per_page=100&page={page}&status=completed")
              if not data:
                  break
              runs = data.get("workflow_runs", [])
              if not runs:
                  break
              for run in runs:
                  if run["id"] != current_run:
                      gh("DELETE", f"/repos/{repo}/actions/runs/{run['id']}")
                      deleted += 1
              if len(runs) < 100:
                  break
              page += 1
          print(f"Deleted {deleted} completed runs")
          PYEOF
